service:
  host: "0.0.0.0"
  port: 8080
  poll_interval_seconds: 300

storage:
  db_path: "data/prediction_markets.db"

sources:
  use_mock: true
  kalshi:
    enabled: true
    base_url: "https://api.elections.kalshi.com/trade-api/v2"
  polymarket:
    enabled: true
    base_url: "https://gamma-api.polymarket.com"

detection:
  min_divergence_pct_points: 5.0
  min_volume: 1000.0
  repricing_threshold_pct_points: 8.0
  lookback_days: 30

scoring:
  weight_difference: 0.40
  weight_liquidity: 0.25
  weight_recency: 0.20
  weight_rarity: 0.15