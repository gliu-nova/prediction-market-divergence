name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Check Cloudflare secrets are set
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN secret is missing in GitHub Actions secrets."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ERROR: CLOUDFLARE_ACCOUNT_ID secret is missing in GitHub Actions secrets."
            exit 1
          fi
          echo "Cloudflare secrets are present."

      - name: Verify Cloudflare auth
        run: npx wrangler whoami

      - name: Verify Pages deploy artifacts
        run: |
          test -d public || (echo "ERROR: public/ is missing" && exit 1)
          test -f public/index.html || (echo "ERROR: public/index.html is missing" && exit 1)
          test -d functions || (echo "ERROR: functions/ is missing" && exit 1)
          test -f wrangler.toml || (echo "ERROR: wrangler.toml is missing" && exit 1)
          echo "Deploy artifacts OK:"
          ls -la public
          ls -la functions

      - name: Ensure Cloudflare Pages project exists
        run: npx wrangler pages project create prediction-market-divergence --production-branch main || true

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=prediction-market-divergence --branch=main --env=""