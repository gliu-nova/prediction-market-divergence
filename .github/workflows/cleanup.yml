name: Daily D1 Cleanup

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger D1 cleanup
        env:
          POLL_SECRET: ${{ secrets.POLL_SECRET }}
        run: |
          set -euo pipefail
          URL="https://prediction-market-divergence.pages.dev/maintenance/cleanup"
          if [ -n "${POLL_SECRET:-}" ]; then
            HTTP=$(curl -sS -o /tmp/pmd-cleanup.json -w "%{http_code}" -X POST -H "Authorization: Bearer ${POLL_SECRET}" "$URL")
          else
            HTTP=$(curl -sS -o /tmp/pmd-cleanup.json -w "%{http_code}" -X POST "$URL")
          fi
          echo "Cleanup HTTP: $HTTP"
          cat /tmp/pmd-cleanup.json
          echo
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: POST /maintenance/cleanup returned HTTP $HTTP"
            exit 1
          fi