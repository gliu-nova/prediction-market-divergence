name: Scheduled Ingest and Detect

on:
  schedule:
    # Stopgap: 30m interval while D1 free-tier write quota is tight (100k rows/day).
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest + detect
        env:
          POLL_SECRET: ${{ secrets.POLL_SECRET }}
        run: |
          set -euo pipefail
          BASE="https://prediction-market-divergence.pages.dev"
          AUTH=()
          if [ -n "${POLL_SECRET:-}" ]; then
            AUTH=(-H "Authorization: Bearer ${POLL_SECRET}")
          fi

          INGEST_HTTP=$(curl -sS -o /tmp/pmd-ingest.json -w "%{http_code}" -X POST "${AUTH[@]}" "$BASE/jobs/ingest")
          echo "Ingest HTTP: $INGEST_HTTP"
          cat /tmp/pmd-ingest.json
          echo

          DETECT_HTTP=$(curl -sS -o /tmp/pmd-detect.json -w "%{http_code}" -X POST "${AUTH[@]}" "$BASE/jobs/detect")
          echo "Detect HTTP: $DETECT_HTTP"
          cat /tmp/pmd-detect.json
          echo

          POLL_HTTP=$INGEST_HTTP
          if [ "$INGEST_HTTP" = "200" ] && [ "$DETECT_HTTP" = "200" ]; then
            POLL_HTTP=200
            jq -s '{status:"ok", ingest:.[0], detect:.[1]}' /tmp/pmd-ingest.json /tmp/pmd-detect.json > /tmp/pmd-poll.json
          fi
          echo "Combined status HTTP: $POLL_HTTP"
          cat /tmp/pmd-poll.json 2>/dev/null || true
          echo

          HEALTH_URL="https://prediction-market-divergence.pages.dev/health"
          HEALTH_HTTP=$(curl -sS -o /tmp/pmd-health.json -w "%{http_code}" "$HEALTH_URL")
          echo "Health HTTP: $HEALTH_HTTP"
          cat /tmp/pmd-health.json
          echo

          STATUS=$(jq -r '.status // "unknown"' /tmp/pmd-health.json)
          LAST_ERROR=$(jq -r '.last_error // empty' /tmp/pmd-health.json)
          echo "Health status: $STATUS"
          if [ -n "$LAST_ERROR" ] && [ "$LAST_ERROR" != "null" ]; then
            echo "Warning: last_poll_error=$LAST_ERROR"
          fi

          if [ "$POLL_HTTP" != "200" ]; then
            echo "ERROR: POST /poll returned HTTP $POLL_HTTP"
            exit 1
          fi

          if [ "$HEALTH_HTTP" != "200" ]; then
            echo "ERROR: /health returned HTTP $HEALTH_HTTP"
            exit 1
          fi