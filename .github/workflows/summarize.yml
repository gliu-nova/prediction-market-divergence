name: Summarize Indicators

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger D1 summarization
        env:
          POLL_SECRET: ${{ secrets.POLL_SECRET }}
        run: |
          set -euo pipefail
          URL="https://prediction-market-divergence.pages.dev/jobs/summarize"
          if [ -n "${POLL_SECRET:-}" ]; then
            HTTP=$(curl -sS -o /tmp/pmd-summarize.json -w "%{http_code}" -X POST -H "Authorization: Bearer ${POLL_SECRET}" "$URL")
          else
            HTTP=$(curl -sS -o /tmp/pmd-summarize.json -w "%{http_code}" -X POST "$URL")
          fi
          echo "Summarize HTTP: $HTTP"
          cat /tmp/pmd-summarize.json
          echo
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: POST /jobs/summarize returned HTTP $HTTP"
            exit 1
          fi