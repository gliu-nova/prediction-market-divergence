# Must match your Cloudflare Pages project name
name = "prediction-market-divergence"
compatibility_date = "2026-06-10"
pages_build_output_dir = "public"

[[d1_databases]]
binding = "DB"
database_name = "prediction-market-divergence"
database_id = "5602c6d4-25ae-4216-8c70-a7cf0720a8f0"

[vars]
ENVIRONMENT = "production"
APP_NAME = "Prediction Market Divergence"
USE_MOCK = "false"
MIN_DIVERGENCE_PCT_POINTS = "5"
MIN_VOLUME = "1000"
LOOKBACK_DAYS = "30"
OPPORTUNITY_MAX_AGE_HOURS = "24"
OBSERVATION_RETENTION_DAYS = "30"
POLYMARKET_MAX_MARKETS = "300"
POLYMARKET_MAX_GAMMA_PAGES = "3"
POLYMARKET_CLOB_ENRICH_MAX = "300"

[env.preview.vars]
ENVIRONMENT = "preview"
USE_MOCK = "true"

# Scheduled polling runs via GitHub Actions (.github/workflows/poll.yml), not Cloudflare
# cron. Pages does not support Cron Triggers; do not create a separate Worker with this
# name unless you intentionally migrate polling to Workers.

# Secrets (set in dashboard or via wrangler pages secret put):
#   POLL_SECRET — optional bearer token for POST /poll
#   KALSHI_ACCESS_KEY — Kalshi API key ID (UUID from Kalshi dashboard)
#   KALSHI_PRIVATE_KEY — Kalshi RSA private key PEM (full file contents)